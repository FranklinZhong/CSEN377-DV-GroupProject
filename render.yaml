services:
  # ── Backend: FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: medinsight-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DB_PATH
        # /tmp is writable on Render free tier; DB is re-downloaded on each cold start.
        value: /tmp/medinsight.db
      - key: ALLOWED_ORIGINS
        # Update if your frontend URL differs (e.g. Render appended a suffix).
        value: "https://medinsight-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173"
      - key: DB_DOWNLOAD_URL
        value: https://github.com/FranklinZhong/CSEN377-DV-GroupProject/releases/download/v1.0-data/medinsight.db

  # ── Frontend: Vue 3 static build ───────────────────────────────────────────
  - type: web
    name: medinsight-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        # Must point to the deployed backend URL. Update if Render assigned a
        # different name (e.g. medinsight-api-xxxx.onrender.com).
        value: https://medinsight-api-xylx.onrender.com
    routes:
      # Rewrite all paths to index.html so Vue Router handles client-side routing.
      - type: rewrite
        source: /*
        destination: /index.html
